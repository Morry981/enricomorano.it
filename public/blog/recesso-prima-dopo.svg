<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" role="img" aria-label="Area cliente PrestaShop: prima senza pulsante di recesso, dopo con il pulsante conforme">
    <rect width="860" height="420" fill="#0f1620"/>
